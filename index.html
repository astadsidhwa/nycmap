<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Interactive Pin & Itinerary Map</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body, html {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    #map {
      height: 100vh;
      width: 100vw;
      background-color: #f8f9fa;
    }

    /* Controls Overlay */
    .controls-overlay {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 780px;
      pointer-events: none;
    }

    .control-panel {
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 6px 10px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.6);
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .control-panel::-webkit-scrollbar {
      display: none;
    }

    .panel-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #888;
      margin-right: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Filter Buttons */
    .btn {
      background: #f1f3f5;
      border: 1px solid #dee2e6;
      color: #333;
      padding: 5px 10px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s ease;
    }

    .btn:hover {
      background: #e9ecef;
      border-color: #ced4da;
    }

    .btn.active {
      background: #111111;
      color: #ffffff;
      border-color: #111111;
    }

    .btn-day.active {
      background: #007aff;
      color: #ffffff;
      border-color: #007aff;
    }

    .btn-halal.active {
      background: #2b8a3e;
      color: #ffffff;
      border-color: #2b8a3e;
    }

    .btn-action {
      background: #e7f5ff;
      color: #1c7ed6;
      border-color: #a5d8ff;
      font-weight: 600;
    }

    .btn-action:hover {
      background: #d0ebff;
    }

    .divider {
      width: 1px;
      height: 18px;
      background: #ced4da;
      flex-shrink: 0;
      margin: 0 3px;
    }

    .pin-counter {
      font-size: 11px;
      font-weight: 700;
      color: #007aff;
      white-space: nowrap;
      padding-left: 4px;
      flex-shrink: 0;
    }

    /* Custom Emoji Pin */
    .custom-div-icon {
      background: none;
      border: none;
    }

    .marker-pin {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #222222;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .marker-pin:hover {
      transform: scale(1.18);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      z-index: 999 !important;
    }

    /* Popup Card */
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      padding: 4px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .popup-card {
      padding: 8px 4px;
      max-width: 250px;
    }

    .popup-card h3 {
      font-size: 15px;
      color: #111;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .meta-row {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .region-tag {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      background-color: #e9ecef;
      color: #495057;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .day-tag {
      font-size: 10px;
      font-weight: 700;
      background-color: #e3f2fd;
      color: #0d47a1;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .halal-badge-tag {
      font-size: 10px;
      font-weight: 700;
      background-color: #d3f9d8;
      color: #2b8a3e;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .timing-badge {
      font-size: 11px;
      font-weight: 600;
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
      padding: 3px 6px;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .popup-card .address {
      font-size: 12px;
      color: #6c757d;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .popup-card .notes {
      font-size: 12px;
      color: #333;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .popup-card .gmaps-btn {
      display: block;
      text-align: center;
      background-color: #007aff;
      color: #ffffff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 10px;
      border-radius: 6px;
      transition: background 0.2s ease;
    }

    .popup-card .gmaps-btn:hover {
      background-color: #0056b3;
    }

    /* Modal Styling */
    .modal-backdrop {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-card h2 {
      font-size: 18px;
      color: #111;
    }

    .modal-card textarea {
      width: 100%;
      height: 180px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-submit {
      background: #007aff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancel {
      background: #f1f3f5;
      color: #333;
      border: 1px solid #ccc;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Controls Overlay -->
  <div class="controls-overlay">
    <!-- Row 1: Itinerary Day Filter & Actions -->
    <div class="control-panel" id="day-bar">
      <span class="panel-label">Day:</span>
      <button class="btn btn-day active" onclick="filterDay('all', this)">📅 All Days</button>
      <button class="btn btn-day" onclick="filterDay(1, this)">Day 1 (Fri)</button>
      <button class="btn btn-day" onclick="filterDay(2, this)">Day 2 (Sat)</button>
      <button class="btn btn-day" onclick="filterDay(3, this)">Day 3 (Sun)</button>
      <button class="btn btn-day" onclick="filterDay(4, this)">Day 4 (Mon)</button>
      <button class="btn btn-day" onclick="filterDay(5, this)">Day 5 (Tue)</button>
      <button class="btn btn-day" onclick="filterDay(6, this)">Day 6 (Wed)</button>
      <div class="divider"></div>
      <button class="btn btn-halal" id="halalToggleBtn" onclick="toggleHalalFilter()">🥩 Halal Only</button>
      <div class="divider"></div>
      <button class="btn btn-action" onclick="openImportModal()">📥 Import JSON</button>
      <button class="btn btn-action" onclick="resetToDefault()">🔄 Reset</button>
      <div class="divider"></div>
      <span class="pin-counter" id="counter">0 Pins</span>
    </div>

    <!-- Row 2: Category Filter -->
    <div class="control-panel" id="category-bar">
      <span class="panel-label">Type:</span>
      <button class="btn active" onclick="filterCategory('all', this)">📍 All</button>
      <button class="btn" onclick="filterCategory('dumplings', this)">🥟 Dumplings</button>
      <button class="btn" onclick="filterCategory('delis', this)">🥯 Delis</button>
      <button class="btn" onclick="filterCategory('street-food', this)">🌮 Street Food</button>
      <button class="btn" onclick="filterCategory('pizza', this)">🍕 Pizza</button>
      <button class="btn" onclick="filterCategory('bbq', this)">🍖 BBQ</button>
      <button class="btn" onclick="filterCategory('hotdogs', this)">🌭 Hot Dogs</button>
      <button class="btn" onclick="filterCategory('markets', this)">🛒 Markets</button>
      <button class="btn" onclick="filterCategory('shopping', this)">🛍️ Shopping</button>
      <button class="btn" onclick="filterCategory('museums', this)">🎨 Museums</button>
      <button class="btn" onclick="filterCategory('parks', this)">🌳 Parks</button>
      <button class="btn" onclick="filterCategory('sports', this)">🥊 Sports & Shows</button>
    </div>

      <button class="btn" onclick="zoomToRegion(40.6900, -73.9800, 13)">Brooklyn</button>
      <button class="btn" onclick="zoomToRegion(40.8000, -73.8600, 12)">Queens & Bronx</button>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-backdrop" id="importModal">
    <div class="modal-card">
      <h2>📥 Import New Pins (JSON)</h2>
      <p style="font-size:12px; color:#666;">Paste a JSON array of new locations below to add them directly to your live map.</p>
      <textarea id="jsonInput" placeholder='[{"id":"my-spot", "name":"New Spot", "emoji":"📍", "category":"street-food", "day":1, "isHalal":true, "address":"NYC", "coordinates":[40.7128, -74.0060], "region":"Manhattan", "notes":"Great spot", "priceLevel":"$"}]'></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeImportModal()">Cancel</button>
        <button class="btn-submit" onclick="submitJSON()">Add to Map</button>
      </div>
    </div>
  </div>

  <!-- Map Canvas -->
  <div id="map"></div>

    // Non-food categories implicitly halal
    const nonFoodCategories = ['parks', 'museums', 'shopping', 'sports', 'markets'];

    function getStoredPlaces() {
      const stored = localStorage.getItem('nyc_map_places');
      if (stored) {
        try {
          return JSON.parse(stored);
        } catch (e) {
          console.error('Failed to parse local storage, returning defaults');
        }
      }
      return defaultPlaces;
    }

    let places = getStoredPlaces();
    let activeCategory = 'all';
    let activeDay = 'all';
    let halalOnlyFilter = false;
    let markerStore = [];

    // Initialize Map
    const map = L.map('map', {
      zoomControl: false,
      attributionControl: false
    }).setView([40.7400, -73.9800], 12);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      subdomains: 'abcd'
    }).addTo(map);

    function renderPins() {
      markerStore.forEach(item => map.removeLayer(item.markerInstance));
      markerStore = [];

      places.forEach(place => {
        const customIcon = L.divIcon({
          html: `<div class="marker-pin">${place.emoji || '📍'}</div>`,
          className: 'custom-div-icon',
          iconSize: [36, 36],
          iconAnchor: [18, 18],
          popupAnchor: [0, -18]
        });

        const gmapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((place.name || '') + ' ' + (place.address || ''))}`;
        const badgeHtml = place.timingBadge ? `<div class="timing-badge">⏰ ${place.timingBadge}</div>` : '';
        const halalBadge = (place.isHalal || nonFoodCategories.includes(place.category)) 
          ? `<span class="halal-badge-tag">🥩 Halal Friendly</span>` 
          : '';

        const popupContent = `
          <div class="popup-card">
            <h3><span>${place.emoji || '📍'}</span> ${place.name}</h3>
            <div class="meta-row">
              <span class="region-tag">${place.region || 'NYC'}</span>
              <span class="day-tag">Day ${place.day || 1}</span>
              ${halalBadge}
            </div>
            ${badgeHtml}
            <div class="address">${place.address || ''}</div>
            <div class="notes">${place.notes || ''}</div>
            <a href="${gmapsUrl}" target="_blank" class="gmaps-btn">Open in Google Maps ➔</a>
          </div>
        `;

        const marker = L.marker(place.coordinates, { icon: customIcon }).bindPopup(popupContent);

        markerStore.push({
          category: place.category,
          day: place.day,
          isHalal: place.isHalal || nonFoodCategories.includes(place.category),
          markerInstance: marker
        });
      });

      applyFilters();
    }

    function applyFilters() {
      let visibleCount = 0;
      markerStore.forEach(item => {
        const matchesCategory = (activeCategory === 'all' || item.category === activeCategory);
        const matchesDay = (activeDay === 'all' || item.day === activeDay);
        const matchesHalal = (!halalOnlyFilter || item.isHalal === true);

        if (matchesCategory && matchesDay && matchesHalal) {
          item.markerInstance.addTo(map);
          visibleCount++;
        } else {
          map.removeLayer(item.markerInstance);
        }
      });
      document.getElementById('counter').innerText = `${visibleCount} ${visibleCount === 1 ? 'Pin' : 'Pins'}`;
    }

    function filterDay(day, btnElement) {
      document.querySelectorAll('#day-bar .btn-day').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');
      activeDay = day;
      applyFilters();
    }

    function filterCategory(category, btnElement) {
      document.querySelectorAll('#category-bar .btn').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');
      activeCategory = category;
      applyFilters();
    }

    function toggleHalalFilter() {
      halalOnlyFilter = !halalOnlyFilter;
      const btn = document.getElementById('halalToggleBtn');
      if (halalOnlyFilter) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
      applyFilters();
    }

    function zoomToRegion(lat, lng, zoomLevel) {
      map.flyTo([lat, lng], zoomLevel, { duration: 1.2, easeLinearity: 0.25 });
    }

    function openImportModal() {
      document.getElementById('importModal').style.display = 'flex';
    }

    function closeImportModal() {
      document.getElementById('importModal').style.display = 'none';
      document.getElementById('jsonInput').value = '';
    }

    function submitJSON() {
      const rawText = document.getElementById('jsonInput').value.trim();
      if (!rawText) return;

      try {
        const parsed = JSON.parse(rawText);
        const newItems = Array.isArray(parsed) ? parsed : [parsed];

        places = [...places, ...newItems];
        localStorage.setItem('nyc_map_places', JSON.stringify(places));
        renderPins();
        closeImportModal();
        alert(`Successfully added ${newItems.length} new pin(s)!`);
      } catch (e) {
        alert("Invalid JSON format! Make sure you copied the full array.");
      }
    }

    function resetToDefault() {
      if (confirm("Reset map to original list? (This clears any imported pins)")) {
        localStorage.removeItem('nyc_map_places');
        places = [...defaultPlaces];
        renderPins();
      }
    }

    renderPins();
  </script>
